# Compila su macOS e produce una .ipa NON firmata come artifact scaricabile
# (installabile su iPhone via sideloading, vedi README). Per la .ipa firmata
# servono l'account Apple Developer, certificati e provisioning profile.
name: iOS build (unsigned)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts: evita i postinstall (sharp) che non servono alla build.
      - name: Installa dipendenze npm
        run: npm ci --ignore-scripts

      - name: Capacitor sync (copia web assets e config nel progetto iOS)
        run: npx cap sync ios

      - name: Pod install
        working-directory: ios/App
        run: pod install

      - name: Archive senza firma
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath output/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # La .ipa è solo Payload/App.app zippato. Non essendo firmata NON si
      # installa direttamente: va firmata in sideloading (Sideloadly/AltStore)
      # o ricostruita da Xcode con un team di sviluppo.
      - name: Impacchetta la .ipa non firmata
        working-directory: ios/App
        run: |
          mkdir -p output/Payload
          cp -R output/App.xcarchive/Products/Applications/App.app output/Payload/
          cd output && zip -qry ChillCalendar-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ChillCalendar-unsigned-ipa
          path: ios/App/output/ChillCalendar-unsigned.ipa
          retention-days: 30
