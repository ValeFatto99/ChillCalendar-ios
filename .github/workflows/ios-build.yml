# Check di compilazione: verifica che il progetto iOS compili su macOS.
# Build SENZA firma (CODE_SIGNING_ALLOWED=NO): per la .ipa firmata servono
# l'account Apple Developer, certificati e provisioning profile (vedi README).
name: iOS build (unsigned)

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts: evita i postinstall (sharp) che non servono alla build.
      - name: Installa dipendenze npm
        run: npm ci --ignore-scripts

      - name: Capacitor sync (copia web assets e config nel progetto iOS)
        run: npx cap sync ios

      - name: Pod install
        working-directory: ios/App
        run: pod install

      - name: Build senza firma
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
